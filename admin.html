<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 | 로뎀카페 · 선지서점</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
:root{--green:#1F4D33;--green-deep:#153824;--mint:#EAF2EB;--yellow:#F6D84B;--paper:#FCFBF7;--line:#DCE4DA;--ink:#22271F;--red:#C0392B}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard',sans-serif;background:var(--paper);color:var(--ink);line-height:1.55;padding-bottom:120px}
.wrap{max-width:640px;margin:0 auto;padding:0 20px}
header{background:var(--green);color:#fff;padding:20px}
header .wrap{padding:0}
header h1{font-size:19px}
header p{font-size:13px;opacity:.8;margin-top:2px}
section{margin-top:26px}
h2{font-size:17px;color:var(--green-deep);margin-bottom:10px;padding-left:10px;border-left:4px solid var(--yellow)}
.card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:12px}
label{display:block;font-size:12px;font-weight:700;color:#6a766a;margin:12px 0 4px}
label:first-child{margin-top:0}
input[type=text],textarea{width:100%;border:1px solid var(--line);border-radius:10px;padding:11px 12px;font-size:15px;font-family:inherit;background:#fff}
textarea{resize:vertical;min-height:64px}
input:focus,textarea:focus{outline:2px solid var(--green);border-color:var(--green)}
.row{display:flex;gap:10px}
.row>div{flex:1}
.hint{font-size:12px;color:#8aa091;margin-top:6px}
.photo-row{display:flex;align-items:center;gap:12px;margin-top:6px}
.photo-row img{width:64px;height:64px;object-fit:cover;border-radius:10px;border:1px solid var(--line);background:var(--mint)}
input[type=file]{font-size:13px}
.token-box{background:var(--mint);border-radius:14px;padding:18px;margin-top:20px}
.token-box h3{font-size:15px;color:var(--green-deep);margin-bottom:6px}
.token-box p{font-size:13px;color:#4a544a;margin-bottom:10px}
.savebar{position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1px solid var(--line);padding:14px 20px;z-index:10}
.savebar .wrap{display:flex;gap:10px;align-items:center;padding:0}
button{font-family:inherit;cursor:pointer}
.btn-save{flex:1;background:var(--green);color:#fff;border:none;border-radius:12px;padding:15px;font-size:16px;font-weight:800}
.btn-save:disabled{background:#9ab3a2}
.btn-sub{background:#fff;border:1px solid var(--line);border-radius:12px;padding:15px 16px;font-size:14px;font-weight:700;color:var(--green-deep)}
#status{font-size:13px;margin-top:8px;font-weight:700}
#status.ok{color:var(--green)}
#status.err{color:var(--red)}
.top-status{font-size:13px;padding:10px 14px;border-radius:10px;margin-top:14px;display:none}
.top-status.show{display:block}
.top-status.ok{background:var(--mint);color:var(--green-deep)}
.top-status.err{background:#FBE9E7;color:var(--red)}
</style>
</head>
<body>

<header>
  <div class="wrap">
    <h1>🌿 홈페이지 관리자</h1>
    <p>로뎀카페 · 선지서점 — 내용을 수정하고 맨 아래 저장을 누르세요</p>
  </div>
</header>

<div class="wrap">

  <div id="topStatus" class="top-status"></div>

  <!-- 토큰 -->
  <div class="token-box" id="tokenBox">
    <h3>🔑 GitHub 열쇠(토큰) 등록</h3>
    <p>처음 한 번만 등록하면 이 기기에 저장됩니다. 발급 방법은 운영매뉴얼을 참고하세요.</p>
    <input type="text" id="token" placeholder="ghp_ 또는 github_pat_ 으로 시작하는 토큰">
    <p class="hint">이 열쇠는 이 브라우저에만 저장되며 외부로 전송되지 않습니다 (GitHub 저장 시에만 사용).</p>
  </div>

  <section>
    <h2>📢 이달의 소식 (홈 화면)</h2>
    <div class="card">
      <label>날짜 표기</label><input type="text" id="n0date">
      <label>제목</label><input type="text" id="n0title">
      <label>내용</label><textarea id="n0text"></textarea>
    </div>
    <div class="card">
      <label>날짜 표기</label><input type="text" id="n1date">
      <label>제목</label><input type="text" id="n1title">
      <label>내용</label><textarea id="n1text"></textarea>
    </div>
  </section>

  <section>
    <h2>🍓 시즌 추천 메뉴 (카페)</h2>
    <div class="card">
      <label>메뉴 이름</label><input type="text" id="s0name">
      <label>한 줄 설명</label><input type="text" id="s0desc">
      <div class="row">
        <div><label>가격</label><input type="text" id="s0price" placeholder="4,500원"></div>
        <div><label>뱃지 문구</label><input type="text" id="s0badge" placeholder="여름 시즌"></div>
      </div>
      <label>사진 교체</label>
      <div class="photo-row">
        <img id="s0preview" alt="">
        <input type="file" id="s0file" accept="image/*">
      </div>
      <p class="hint">사진을 선택하면 저장 시 자동으로 크기를 줄여 업로드합니다.</p>
    </div>
    <div class="card">
      <label>메뉴 이름</label><input type="text" id="s1name">
      <label>한 줄 설명</label><input type="text" id="s1desc">
      <div class="row">
        <div><label>가격</label><input type="text" id="s1price"></div>
        <div><label>뱃지 문구</label><input type="text" id="s1badge"></div>
      </div>
      <label>사진 교체</label>
      <div class="photo-row">
        <img id="s1preview" alt="">
        <input type="file" id="s1file" accept="image/*">
      </div>
    </div>
  </section>

  <section>
    <h2>📖 이달의 신간 (서점)</h2>
    <div class="card">
      <label>책 제목</label><input type="text" id="b0title">
      <label>저자 · 출판사</label><input type="text" id="b0author">
      <label>한 줄 소개</label><textarea id="b0desc"></textarea>
    </div>
    <div class="card">
      <label>책 제목</label><input type="text" id="b1title">
      <label>저자 · 출판사</label><input type="text" id="b1author">
      <label>한 줄 소개</label><textarea id="b1desc"></textarea>
    </div>
  </section>

  <section>
    <h2>✝️ 담임목사님 저서 (서점)</h2>
    <div class="card">
      <label>책 제목</label><input type="text" id="ptitle">
      <label>저자 표기</label><input type="text" id="pauthor">
      <label>소개</label><textarea id="pdesc"></textarea>
    </div>
  </section>

</div>

<div class="savebar">
  <div class="wrap">
    <button class="btn-sub" onclick="loadData(true)">다시 불러오기</button>
    <button class="btn-save" id="saveBtn" onclick="saveAll()">저장하고 사이트에 반영</button>
  </div>
  <div class="wrap"><div id="status"></div></div>
</div>

<script>
// ── 설정 (저장소가 바뀌면 여기만 수정) ──
const OWNER = 'ezerahn';
const REPO  = 'gsmch-mission';
const BRANCH = 'main';
// ─────────────────────────────

const $ = id => document.getElementById(id);
const api = p => `https://api.github.com/repos/${OWNER}/${REPO}/contents/${p}`;
const authHeaders = () => {
  const t = $('token').value.trim();
  return t ? {Authorization: 'Bearer ' + t, Accept: 'application/vnd.github+json'} : {Accept: 'application/vnd.github+json'};
};

// 토큰 기억
$('token').value = localStorage.getItem('gsmch_token') || '';
$('token').addEventListener('change', () => localStorage.setItem('gsmch_token', $('token').value.trim()));

function topMsg(msg, ok){
  const el = $('topStatus');
  el.textContent = msg; el.className = 'top-status show ' + (ok ? 'ok' : 'err');
}
function status(msg, ok){
  const el = $('status');
  el.textContent = msg; el.className = ok ? 'ok' : 'err';
}

// base64 ↔ UTF-8
const b64decode = s => new TextDecoder().decode(Uint8Array.from(atob(s.replace(/\n/g,'')), c => c.charCodeAt(0)));
const b64encode = s => { const u = new TextEncoder().encode(s); let bin=''; u.forEach(b => bin += String.fromCharCode(b)); return btoa(bin); };

let dataSha = null;

async function loadData(manual){
  try{
    const r = await fetch(api('data.json') + '?ref=' + BRANCH + '&t=' + Date.now(), {headers: authHeaders()});
    if(!r.ok) throw new Error('data.json을 불러오지 못했습니다 (' + r.status + ')');
    const j = await r.json();
    dataSha = j.sha;
    const d = JSON.parse(b64decode(j.content));
    ['0','1'].forEach(i => {
      $('n'+i+'date').value = d.news[i]?.date || '';
      $('n'+i+'title').value = d.news[i]?.title || '';
      $('n'+i+'text').value = d.news[i]?.text || '';
      $('s'+i+'name').value = d.season[i]?.name || '';
      $('s'+i+'desc').value = d.season[i]?.desc || '';
      $('s'+i+'price').value = d.season[i]?.price || '';
      $('s'+i+'badge').value = d.season[i]?.badge || '';
      $('s'+i+'preview').src = `https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}/img/season${+i+1}.jpg?t=` + Date.now();
      $('b'+i+'title').value = d.newbooks[i]?.title || '';
      $('b'+i+'author').value = d.newbooks[i]?.author || '';
      $('b'+i+'desc').value = d.newbooks[i]?.desc || '';
    });
    $('ptitle').value = d.pastorbook?.title || '';
    $('pauthor').value = d.pastorbook?.author || '';
    $('pdesc').value = d.pastorbook?.desc || '';
    window._emoji = [d.season[0]?.emoji || '🍓', d.season[1]?.emoji || '🍊'];
    if(manual) topMsg('현재 사이트 내용을 불러왔습니다.', true);
  }catch(e){ topMsg('불러오기 실패: ' + e.message, false); }
}

// 이미지 리사이즈 → base64 (JPEG)
function fileToResizedB64(file){
  return new Promise((res, rej) => {
    const img = new Image();
    img.onload = () => {
      const max = 1200;
      let w = img.width, h = img.height;
      const sc = Math.min(1, max / Math.max(w, h));
      w = Math.round(w * sc); h = Math.round(h * sc);
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      res(c.toDataURL('image/jpeg', 0.85).split(',')[1]);
    };
    img.onerror = rej;
    img.src = URL.createObjectURL(file);
  });
}

async function putFile(path, contentB64, message){
  // 기존 sha 확인 (있으면 덮어쓰기)
  let sha = null;
  const g = await fetch(api(path) + '?ref=' + BRANCH + '&t=' + Date.now(), {headers: authHeaders()});
  if(g.ok){ sha = (await g.json()).sha; }
  const body = {message, content: contentB64, branch: BRANCH};
  if(sha) body.sha = sha;
  const r = await fetch(api(path), {method: 'PUT', headers: {...authHeaders(), 'Content-Type': 'application/json'}, body: JSON.stringify(body)});
  if(!r.ok){
    const err = await r.json().catch(() => ({}));
    throw new Error(path + ' 저장 실패: ' + (err.message || r.status));
  }
  return (await r.json()).content.sha;
}

async function saveAll(){
  if(!$('token').value.trim()){ topMsg('먼저 위에 GitHub 토큰을 입력해 주세요.', false); window.scrollTo(0,0); return; }
  $('saveBtn').disabled = true;
  try{
    // 1) 사진 업로드
    for(const [i, path] of [['0','img/season1.jpg'], ['1','img/season2.jpg']]){
      const f = $('s'+i+'file').files[0];
      if(f){
        status('사진 업로드 중... (' + f.name + ')', true);
        const b64 = await fileToResizedB64(f);
        await putFile(path, b64, '시즌메뉴 사진 업데이트');
      }
    }
    // 2) data.json 저장
    status('내용 저장 중...', true);
    const d = {
      updated: new Date().toISOString().slice(0,10),
      news: [0,1].map(i => ({date: $('n'+i+'date').value, title: $('n'+i+'title').value, text: $('n'+i+'text').value})),
      season: [0,1].map(i => ({name: $('s'+i+'name').value, desc: $('s'+i+'desc').value, price: $('s'+i+'price').value, badge: $('s'+i+'badge').value, emoji: (window._emoji||['🍓','🍊'])[i], img: 'img/season' + (i+1) + '.jpg'})),
      newbooks: [0,1].map(i => ({title: $('b'+i+'title').value, author: $('b'+i+'author').value, desc: $('b'+i+'desc').value})),
      pastorbook: {title: $('ptitle').value, author: $('pauthor').value, desc: $('pdesc').value}
    };
    await putFile('data.json', b64encode(JSON.stringify(d, null, 2)), '사이트 내용 업데이트');
    status('', true);
    topMsg('✅ 저장 완료! 1~2분 뒤 사이트에 반영됩니다. (반영이 안 보이면 새로고침)', true);
    window.scrollTo(0,0);
    ['0','1'].forEach(i => $('s'+i+'file').value = '');
  }catch(e){
    topMsg('❌ ' + e.message + ' — 토큰 권한(Contents: Read and write)을 확인해 주세요.', false);
    window.scrollTo(0,0);
  }
  $('saveBtn').disabled = false;
}

loadData(false);
</script>

</body>
</html>
