<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 | 로뎀카페 · 선지서점</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
:root{--green:#1F4D33;--green-deep:#153824;--mint:#EAF2EB;--yellow:#F6D84B;--paper:#FCFBF7;--line:#DCE4DA;--ink:#22271F;--red:#C0392B}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard',sans-serif;background:var(--paper);color:var(--ink);line-height:1.55;padding-bottom:130px}
.wrap{max-width:640px;margin:0 auto;padding:0 20px}
header{background:var(--green);color:#fff;padding:20px}
header .wrap{padding:0}
header h1{font-size:19px}
header p{font-size:13px;opacity:.8;margin-top:2px}
section{margin-top:26px}
h2{font-size:17px;color:var(--green-deep);margin-bottom:10px;padding-left:10px;border-left:4px solid var(--yellow);display:flex;justify-content:space-between;align-items:center}
.card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:12px;position:relative}
label{display:block;font-size:12px;font-weight:700;color:#6a766a;margin:12px 0 4px}
.card label:first-child{margin-top:0}
input[type=text],textarea,select{width:100%;border:1px solid var(--line);border-radius:10px;padding:11px 12px;font-size:15px;font-family:inherit;background:#fff}
textarea{resize:vertical;min-height:58px}
input:focus,textarea:focus,select:focus{outline:2px solid var(--green);border-color:var(--green)}
.row{display:flex;gap:10px}
.row>div{flex:1}
.hint{font-size:12px;color:#8aa091;margin-top:6px}
.photo-row{display:flex;align-items:center;gap:12px;margin-top:6px}
.photo-row img{width:56px;height:56px;object-fit:cover;border-radius:10px;border:1px solid var(--line);background:var(--mint)}
input[type=file]{font-size:12px;max-width:200px}
.chk{display:flex;align-items:center;gap:8px;margin-top:12px;font-size:14px}
.chk input{width:18px;height:18px;accent-color:var(--green)}
.del-btn{position:absolute;top:14px;right:14px;background:#FBE9E7;color:var(--red);border:none;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer}
.add-btn{width:100%;background:var(--mint);color:var(--green-deep);border:2px dashed #B9CDBD;border-radius:14px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
.token-box{background:var(--mint);border-radius:14px;padding:18px;margin-top:20px}
.token-box h3{font-size:15px;color:var(--green-deep);margin-bottom:6px}
.token-box p{font-size:13px;color:#4a544a;margin-bottom:10px}
.savebar{position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1px solid var(--line);padding:14px 20px;z-index:10}
.savebar .wrap{display:flex;gap:10px;align-items:center;padding:0}
button{font-family:inherit;cursor:pointer}
.btn-save{flex:1;background:var(--green);color:#fff;border:none;border-radius:12px;padding:15px;font-size:16px;font-weight:800}
.btn-save:disabled{background:#9ab3a2}
.btn-sub{background:#fff;border:1px solid var(--line);border-radius:12px;padding:15px 16px;font-size:14px;font-weight:700;color:var(--green-deep)}
#status{font-size:13px;margin-top:8px;font-weight:700}
#status.ok{color:var(--green)} #status.err{color:var(--red)}
.top-status{font-size:13px;padding:10px 14px;border-radius:10px;margin-top:14px;display:none}
.top-status.show{display:block}
.top-status.ok{background:var(--mint);color:var(--green-deep)}
.top-status.err{background:#FBE9E7;color:var(--red)}
.cnt{font-size:12px;color:#8aa091;font-weight:400}
</style>
</head>
<body>

<header>
  <div class="wrap">
    <h1>🌿 홈페이지 관리자</h1>
    <p>로뎀카페 · 선지서점 — 내용 수정 후 맨 아래 저장을 누르세요</p>
  </div>
</header>

<div class="wrap">

  <div id="topStatus" class="top-status"></div>

  <div class="token-box">
    <h3>🔑 GitHub 열쇠(토큰)</h3>
    <p>처음 한 번만 등록하면 이 기기에 저장됩니다.</p>
    <input type="text" id="token" placeholder="github_pat_ 으로 시작하는 토큰">
  </div>

  <section>
    <h2>📢 이달의 소식 (홈 화면)</h2>
    <div id="newsList"></div>
  </section>

  <section>
    <h2>🍓 시즌 추천 메뉴 (카페)</h2>
    <div id="seasonList"></div>
  </section>

  <section>
    <h2>🏪 서점 기본 문구</h2>
    <div class="card">
      <label>서점 소개 한 줄 (상단 노란 영역)</label><input type="text" id="stScale">
      <label>할인 안내 (초록 배너)</label><input type="text" id="stDiscount">
      <label>시즌 기획전 — 뱃지 (영문 짧게)</label><input type="text" id="stSaleBadge" placeholder="SUMMER / EASTER / CHRISTMAS">
      <label>시즌 기획전 — 제목</label><input type="text" id="stSaleTitle">
      <label>시즌 기획전 — 내용</label><textarea id="stSaleText"></textarea>
    </div>
  </section>

  <section>
    <h2>📚 도서 관리 <span class="cnt" id="bookCnt"></span></h2>
    <div id="bookList"></div>
    <button class="add-btn" onclick="addBook()">＋ 도서 추가</button>
  </section>

  <section>
    <h2>🎁 선물 관리 <span class="cnt" id="giftCnt"></span></h2>
    <div id="giftList"></div>
    <button class="add-btn" onclick="addGift()">＋ 선물 추가</button>
  </section>

</div>

<div class="savebar">
  <div class="wrap">
    <button class="btn-sub" onclick="loadData(true)">다시 불러오기</button>
    <button class="btn-save" id="saveBtn" onclick="saveAll()">저장하고 사이트에 반영</button>
  </div>
  <div class="wrap"><div id="status"></div></div>
</div>

<script>
// ── 설정 (저장소가 바뀌면 여기만 수정) ──
const OWNER='ezerahn', REPO='gsmch-mission', BRANCH='main';
const GIFT_CATS=['머그·텀블러','액자·시계','십자가·목걸이','카드·문구','생활소품','꽃·선물세트'];
// ─────────────────────────────
const $=id=>document.getElementById(id);
const api=p=>`https://api.github.com/repos/${OWNER}/${REPO}/contents/${p}`;
const auth=()=>{const t=$('token').value.trim();return t?{Authorization:'Bearer '+t,Accept:'application/vnd.github+json'}:{Accept:'application/vnd.github+json'}};
$('token').value=localStorage.getItem('gsmch_token')||'';
$('token').addEventListener('change',()=>localStorage.setItem('gsmch_token',$('token').value.trim()));
const topMsg=(m,ok)=>{const e=$('topStatus');e.textContent=m;e.className='top-status show '+(ok?'ok':'err');};
const status=(m,ok)=>{const e=$('status');e.textContent=m;e.className=ok?'ok':'err';};
const b64d=s=>new TextDecoder().decode(Uint8Array.from(atob(s.replace(/\n/g,'')),c=>c.charCodeAt(0)));
const b64e=s=>{const u=new TextEncoder().encode(s);let b='';u.forEach(x=>b+=String.fromCharCode(x));return btoa(b)};
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
const uid=p=>p+Date.now().toString(36)+Math.floor(Math.random()*99);

let D={news:[],season:[],store:{},books:[],gifts:[]};
const FILES={}; // id -> File (사진 업로드 대기)

function renderFixed(){
  $('newsList').innerHTML=D.news.map((n,i)=>`<div class="card">
    <label>날짜 표기</label><input type="text" value="${esc(n.date)}" oninput="D.news[${i}].date=this.value">
    <label>제목</label><input type="text" value="${esc(n.title)}" oninput="D.news[${i}].title=this.value">
    <label>내용</label><textarea oninput="D.news[${i}].text=this.value">${esc(n.text)}</textarea></div>`).join('');
  $('seasonList').innerHTML=D.season.map((s,i)=>`<div class="card">
    <label>메뉴 이름</label><input type="text" value="${esc(s.name)}" oninput="D.season[${i}].name=this.value">
    <label>한 줄 설명</label><input type="text" value="${esc(s.desc)}" oninput="D.season[${i}].desc=this.value">
    <div class="row"><div><label>가격</label><input type="text" value="${esc(s.price)}" oninput="D.season[${i}].price=this.value"></div>
    <div><label>뱃지</label><input type="text" value="${esc(s.badge)}" oninput="D.season[${i}].badge=this.value"></div></div>
    <label>사진 교체 (자동 축소 업로드)</label>
    <div class="photo-row"><img src="https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}/img/season${i+1}.jpg?t=${Date.now()}" onerror="this.style.opacity=.3">
    <input type="file" accept="image/*" onchange="FILES['season${i+1}']=this.files[0]"></div></div>`).join('');
  $('stScale').value=D.store.scale||''; $('stDiscount').value=D.store.discount||'';
  $('stSaleBadge').value=D.store.saleBadge||''; $('stSaleTitle').value=D.store.saleTitle||''; $('stSaleText').value=D.store.saleText||'';
}
function renderBooks(){
  $('bookCnt').textContent='총 '+D.books.length+'권';
  $('bookList').innerHTML=D.books.map((b,i)=>`<div class="card">
    <button class="del-btn" onclick="delBook(${i})">삭제</button>
    <label>책 제목</label><input type="text" value="${esc(b.title)}" oninput="D.books[${i}].title=this.value">
    <label>저자 · 출판사</label><input type="text" value="${esc(b.author)}" oninput="D.books[${i}].author=this.value">
    <label>한 줄 소개</label><textarea oninput="D.books[${i}].desc=this.value">${esc(b.desc)}</textarea>
    <div class="row">
      <div><label>정가 (숫자만, 예: 17000)</label><input type="text" value="${esc(b.price)}" oninput="D.books[${i}].price=this.value" placeholder="비우면 '서점 문의'"></div>
      <div><label>구분</label><select onchange="D.books[${i}].tag=this.value">
        ${['신간','추천','목사님저서'].map(t=>`<option ${b.tag===t?'selected':''}>${t}</option>`).join('')}</select></div>
    </div>
    <div class="chk"><input type="checkbox" ${b.hot?'checked':''} onchange="D.books[${i}].hot=this.checked" id="hot${i}"><label for="hot${i}" style="margin:0">⭐ 지금 가장 많이 찾는 책 (상단 강조)</label></div>
    <label>표지 사진 (선택)</label>
    <div class="photo-row">${b.img?`<img src="https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}/${b.img}?t=${Date.now()}" onerror="this.style.opacity=.3">`:''}
    <input type="file" accept="image/*" onchange="FILES['${b.id}']=this.files[0]"></div></div>`).join('');
}
function renderGifts(){
  $('giftCnt').textContent='총 '+D.gifts.length+'개';
  $('giftList').innerHTML=D.gifts.map((g,i)=>`<div class="card">
    <button class="del-btn" onclick="delGift(${i})">삭제</button>
    <label>상품 이름</label><input type="text" value="${esc(g.name)}" oninput="D.gifts[${i}].name=this.value">
    <label>한 줄 설명</label><input type="text" value="${esc(g.desc)}" oninput="D.gifts[${i}].desc=this.value">
    <div class="row">
      <div><label>가격 표기 (자유롭게)</label><input type="text" value="${esc(g.price)}" oninput="D.gifts[${i}].price=this.value" placeholder="13,000원 / 서점 문의"></div>
      <div><label>종류</label><select onchange="D.gifts[${i}].cat=this.value">
        ${GIFT_CATS.map(c=>`<option ${g.cat===c?'selected':''}>${c}</option>`).join('')}</select></div>
    </div></div>`).join('');
}
function addBook(){D.books.unshift({id:uid('b'),title:'',author:'',desc:'',price:'',tag:'신간',hot:false,img:''});renderBooks();window.scrollTo({top:$('bookList').offsetTop-80,behavior:'smooth'});}
function delBook(i){if(confirm('이 도서를 목록에서 삭제할까요?')){D.books.splice(i,1);renderBooks();}}
function addGift(){D.gifts.unshift({id:uid('g'),name:'',desc:'',price:'',cat:GIFT_CATS[0]});renderGifts();}
function delGift(i){if(confirm('이 선물을 목록에서 삭제할까요?')){D.gifts.splice(i,1);renderGifts();}}

async function loadData(manual){
  try{
    const r=await fetch(api('data.json')+'?ref='+BRANCH+'&t='+Date.now(),{headers:auth()});
    if(!r.ok)throw new Error('data.json 불러오기 실패 ('+r.status+')');
    const j=await r.json();
    D=JSON.parse(b64d(j.content));
    D.books=D.books||[]; D.gifts=D.gifts||[]; D.store=D.store||{}; D.news=D.news||[]; D.season=D.season||[];
    renderFixed();renderBooks();renderGifts();
    if(manual)topMsg('현재 사이트 내용을 불러왔습니다.',true);
  }catch(e){topMsg('불러오기 실패: '+e.message,false);}
}
function fileToB64(file){return new Promise((res,rej)=>{const img=new Image();img.onload=()=>{
  const max=1000;let w=img.width,h=img.height;const sc=Math.min(1,max/Math.max(w,h));w=Math.round(w*sc);h=Math.round(h*sc);
  const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);
  res(c.toDataURL('image/jpeg',0.82).split(',')[1]);};img.onerror=rej;img.src=URL.createObjectURL(file);});}
async function putFile(path,content,msg){
  let sha=null;const g=await fetch(api(path)+'?ref='+BRANCH+'&t='+Date.now(),{headers:auth()});
  if(g.ok)sha=(await g.json()).sha;
  const body={message:msg,content:content,branch:BRANCH};if(sha)body.sha=sha;
  const r=await fetch(api(path),{method:'PUT',headers:{...auth(),'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(path+' 저장 실패: '+(e.message||r.status));}
}
async function saveAll(){
  if(!$('token').value.trim()){topMsg('먼저 위에 GitHub 토큰을 입력해 주세요.',false);window.scrollTo(0,0);return;}
  $('saveBtn').disabled=true;
  try{
    // 서점 문구 수집
    D.store={scale:$('stScale').value,discount:$('stDiscount').value,saleBadge:$('stSaleBadge').value,saleTitle:$('stSaleTitle').value,saleText:$('stSaleText').value};
    // 사진 업로드
    for(const [key,f] of Object.entries(FILES)){
      if(!f)continue;
      status('사진 업로드 중... ('+f.name+')',true);
      const b64=await fileToB64(f);
      const path=key.startsWith('season')?('img/'+key+'.jpg'):('img/'+key+'.jpg');
      await putFile(path,b64,'사진 업데이트: '+key);
      const bk=D.books.find(b=>b.id===key);if(bk)bk.img='img/'+key+'.jpg';
    }
    Object.keys(FILES).forEach(k=>delete FILES[k]);
    // 데이터 저장
    status('내용 저장 중...',true);
    D.updated=new Date().toISOString().slice(0,10);
    await putFile('data.json',b64e(JSON.stringify(D,null,2)),'사이트 내용 업데이트');
    status('',true);
    topMsg('✅ 저장 완료! 1~2분 뒤 사이트에 반영됩니다.',true);
    window.scrollTo(0,0);renderBooks();
  }catch(e){topMsg('❌ '+e.message,false);window.scrollTo(0,0);}
  $('saveBtn').disabled=false;
}
loadData(false);
</script>

</body>
</html>
